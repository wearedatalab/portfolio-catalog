<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DataLab - Catalogo de Piezas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;300;400;600;700;800&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ===================== RESET & BASE ===================== */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;overflow:hidden;height:100%;font-size:16px}
body{font-family:'Montserrat',sans-serif;background:#000;color:#ccc;height:100%;overflow:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
h1,h2,h3,h4,h5,h6{font-family:'Raleway',sans-serif;color:#fff;font-weight:700}
::-webkit-scrollbar{display:none}
::selection{background:#97ea3f;color:#000}

/* ===================== CSS VARIABLES ===================== */
:root{
  --accent:#97ea3f;
  --accent-dim:rgba(151,234,63,.15);
  --accent-glow:rgba(151,234,63,.35);
  --bg-dark:#000;
  --bg-panel:#0a0a0a;
  --bg-glass:rgba(0,0,0,.85);
  --text-heading:#fff;
  --text-body:#ccc;
  --text-muted:#777;
  --radius:12px;
  --transition-smooth:cubic-bezier(.22,1,.36,1);
}

/* ===================== CATALOG WRAPPER ===================== */
#catalog-wrapper{
  width:100vw;height:100vh;overflow:hidden;position:relative;
}
#catalog-track{
  display:flex;flex-direction:row;
  height:100vh;
  transition:transform .7s var(--transition-smooth);
  will-change:transform;
}
.catalog-page{
  min-width:100vw;width:100vw;height:100vh;
  flex-shrink:0;position:relative;overflow:hidden;
}

/* ===================== COVER PAGE ===================== */
.cover-page{display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
.cover-bg{
  position:absolute;inset:0;z-index:0;
  background:linear-gradient(135deg,#000 0%,#050a00 25%,#0a1500 50%,#050a00 75%,#000 100%);
  background-size:400% 400%;
  animation:coverGradient 12s ease infinite;
}
@keyframes coverGradient{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}
.cover-grid{
  position:absolute;inset:0;z-index:1;
  background-image:
    linear-gradient(rgba(151,234,63,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(151,234,63,.04) 1px,transparent 1px);
  background-size:60px 60px;
  animation:gridShift 20s linear infinite;
}
@keyframes gridShift{0%{background-position:0 0}100%{background-position:60px 60px}}
.cover-vignette{
  position:absolute;inset:0;z-index:2;
  background:radial-gradient(ellipse at center,transparent 30%,rgba(0,0,0,.7) 100%);
}
.cover-content{position:relative;z-index:3;text-align:center;max-width:700px;padding:2rem}
.cover-logo{
  width:220px;max-width:60vw;margin-bottom:2.5rem;
  filter:drop-shadow(0 0 30px rgba(151,234,63,.25));
  animation:coverFadeIn .8s ease both,logoGlow 4s ease-in-out infinite alternate;
}
@keyframes coverFadeIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes logoGlow{
  0%{filter:drop-shadow(0 0 20px rgba(151,234,63,.15))}
  100%{filter:drop-shadow(0 0 40px rgba(151,234,63,.35))}
}
.cover-divider{
  width:60px;height:2px;background:var(--accent);margin:0 auto 2rem;
  animation:coverFadeIn .8s .3s ease both;
}
.cover-title{
  font-size:clamp(2rem,5vw,3.5rem);font-weight:200;letter-spacing:.15em;
  text-transform:uppercase;margin-bottom:.75rem;
  animation:coverFadeIn .8s .4s ease both;
}
.cover-subtitle{
  font-family:'Montserrat',sans-serif;font-size:clamp(.85rem,2vw,1.1rem);
  color:var(--text-muted);font-weight:300;letter-spacing:.3em;text-transform:uppercase;
  margin-bottom:3rem;
  animation:coverFadeIn .8s .6s ease both;
}
.cover-btn{
  display:inline-flex;align-items:center;gap:.75rem;
  padding:1rem 2.5rem;
  background:var(--accent);color:#000;
  font-family:'Montserrat',sans-serif;font-weight:600;font-size:.9rem;
  letter-spacing:.1em;text-transform:uppercase;
  border:none;border-radius:50px;cursor:pointer;
  transition:all .4s var(--transition-smooth);
  animation:coverFadeIn .8s .8s ease both;
}
.cover-btn:hover{transform:scale(1.05);box-shadow:0 0 40px rgba(151,234,63,.4)}
.cover-btn svg{animation:bounceArrow 1.5s ease-in-out infinite}
@keyframes bounceArrow{0%,100%{transform:translateX(0)}50%{transform:translateX(6px)}}
.cover-meta{
  position:absolute;bottom:3rem;left:0;right:0;z-index:3;
  display:flex;justify-content:space-between;padding:0 3rem;
  font-size:.75rem;color:var(--text-muted);letter-spacing:.15em;text-transform:uppercase;
  animation:coverFadeIn .8s 1s ease both;
}

/* ===================== TOC PAGE ===================== */
.toc-page{display:flex;flex-direction:column;align-items:center;background:var(--bg-dark);padding:3rem 2rem;overflow-y:auto}
.toc-header{margin-bottom:2.5rem;text-align:center}
.toc-header h2{font-size:1.6rem;font-weight:300;letter-spacing:.15em;text-transform:uppercase;margin-bottom:.5rem}
.toc-header p{color:var(--text-muted);font-size:.85rem;letter-spacing:.1em}
.toc-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1.25rem;
  width:100%;max-width:1200px;padding-bottom:100px;
}
.toc-card{
  position:relative;border-radius:var(--radius);overflow:hidden;cursor:pointer;
  aspect-ratio:16/10;background:#111;
  transition:all .4s var(--transition-smooth);
}
.toc-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(151,234,63,.12)}
.toc-card img{width:100%;height:100%;object-fit:cover;opacity:.6;transition:opacity .4s}
.toc-card:hover img{opacity:.85}
.toc-card-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.9) 0%,transparent 60%);
  display:flex;flex-direction:column;justify-content:flex-end;padding:1rem;
}
.toc-card-cat{
  font-size:.6rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:var(--accent);margin-bottom:.25rem;
}
.toc-card-title{font-size:.8rem;font-weight:600;color:#fff;line-height:1.3}
.toc-card-num{
  position:absolute;top:.75rem;right:.75rem;
  width:28px;height:28px;border-radius:50%;
  background:var(--accent);color:#000;
  display:flex;align-items:center;justify-content:center;
  font-size:.65rem;font-weight:700;
}

/* ===================== CONTENT PAGE ===================== */
.content-page{display:flex;flex-direction:row;background:var(--bg-dark)}
.content-embed-area{
  flex:0 0 62%;height:100vh;position:relative;
  display:flex;align-items:center;justify-content:center;
  background:#050505;padding:2.5rem;
}
.embed-frame{
  width:100%;height:85%;position:relative;
  border-radius:var(--radius);overflow:hidden;
  background:#0a0a0a;
  box-shadow:0 0 0 1px rgba(255,255,255,.06),0 30px 80px rgba(0,0,0,.6);
  display:flex;align-items:center;justify-content:center;
}
.embed-frame iframe,
.embed-frame object{
  width:100%;height:100%;border:none;display:block;
  background:#0a0a0a;
}
.embed-frame img{
  max-width:100%;max-height:100%;width:auto;height:auto;
  object-fit:contain;border:none;display:block;
  cursor:zoom-in;transition:transform .5s var(--transition-smooth);
  image-rendering:high-quality;
}
.embed-frame img:hover{transform:scale(1.03)}
/* Social embeds: centered with elegant framing */
.embed-frame[data-type="facebook"],
.embed-frame[data-type="instagram"],
.embed-frame[data-type="tiktok"]{
  background:radial-gradient(ellipse at center,#111 0%,#0a0a0a 100%);
  overflow-y:auto;overflow-x:hidden;
  scrollbar-width:thin;scrollbar-color:#333 transparent;
  align-items:flex-start;padding:1.5rem;
}
.embed-frame[data-type="facebook"]::-webkit-scrollbar,
.embed-frame[data-type="instagram"]::-webkit-scrollbar,
.embed-frame[data-type="tiktok"]::-webkit-scrollbar{width:4px}
.embed-frame[data-type="facebook"]::-webkit-scrollbar-thumb,
.embed-frame[data-type="instagram"]::-webkit-scrollbar-thumb,
.embed-frame[data-type="tiktok"]::-webkit-scrollbar-thumb{background:#333;border-radius:4px}

.embed-frame[data-type="facebook"] iframe{
  width:100%;max-width:680px;min-height:600px;height:auto;
  background:#fff;border:none;border-radius:10px;
  margin:0 auto;display:block;
  box-shadow:0 8px 40px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.05);
}
.embed-frame[data-type="instagram"] iframe{
  width:100%;max-width:540px;min-height:700px;height:auto;
  background:#fff;border:none;border-radius:10px;
  margin:0 auto;display:block;
  box-shadow:0 8px 40px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.05);
}
.embed-frame[data-type="tiktok"] iframe{
  width:100%;max-width:380px;min-height:700px;height:auto;
  background:#000;border:none;border-radius:10px;
  margin:0 auto;display:block;
  box-shadow:0 8px 40px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.05);
}
/* Web preview: screenshot + visit button overlay */
.embed-frame[data-type="webpreview"]{
  background:#0a0a0a;overflow:hidden;padding:0;
  align-items:stretch;
}
.webpreview-wrap{
  position:relative;width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
}
.webpreview-wrap img{
  width:100%;height:100%;object-fit:cover;object-position:top;
  transition:transform .6s var(--transition-smooth),filter .6s var(--transition-smooth);
  image-rendering:high-quality;
}
.webpreview-wrap:hover img{transform:scale(1.03);filter:brightness(.7)}
.webpreview-overlay{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;transition:opacity .4s var(--transition-smooth);
  background:rgba(0,0,0,.4);
}
.webpreview-wrap:hover .webpreview-overlay{opacity:1}
.webpreview-btn{
  display:inline-flex;align-items:center;gap:.6rem;
  padding:.9rem 2rem;background:var(--accent);color:#000;
  font-weight:600;font-size:.9rem;border-radius:50px;
  text-decoration:none;letter-spacing:.03em;
  box-shadow:0 8px 30px rgba(151,234,63,.3);
  transition:transform .3s,box-shadow .3s;
}
.webpreview-btn:hover{transform:scale(1.06);box-shadow:0 12px 40px rgba(151,234,63,.4)}
.webpreview-btn svg{width:18px;height:18px}
.embed-frame .embed-placeholder{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:1rem;
  background:#0a0a0a;color:var(--text-muted);
}
.embed-placeholder .spinner{
  width:36px;height:36px;border:3px solid rgba(255,255,255,.08);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.embed-placeholder span{font-size:.8rem;letter-spacing:.05em}
.embed-fallback{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1.25rem;text-align:center;padding:2rem;height:100%;
}
.embed-fallback p{color:var(--text-muted);font-size:.85rem;max-width:300px}
.embed-fallback a{
  display:inline-flex;align-items:center;gap:.5rem;
  padding:.75rem 1.75rem;background:var(--accent);color:#000;
  font-weight:600;font-size:.8rem;letter-spacing:.05em;text-transform:uppercase;
  text-decoration:none;border-radius:50px;
  transition:all .3s var(--transition-smooth);
}
.embed-fallback a:hover{transform:scale(1.05);box-shadow:0 0 30px rgba(151,234,63,.3)}

/* info panel */
.content-info{
  flex:0 0 38%;height:100vh;
  background:var(--bg-panel);
  display:flex;flex-direction:column;justify-content:center;
  padding:4rem 3rem;position:relative;
  border-left:1px solid rgba(255,255,255,.04);
}
.info-page-num{
  font-size:.7rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;
  color:var(--text-muted);margin-bottom:1.5rem;
}
.info-page-num span{color:var(--accent)}
.info-category{
  display:inline-block;padding:.35rem 1rem;
  background:var(--accent-dim);color:var(--accent);
  font-size:.65rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  border-radius:50px;border:1px solid rgba(151,234,63,.2);
  margin-bottom:1.5rem;
}
.info-title{
  font-size:clamp(1.5rem,2.5vw,2.2rem);font-weight:700;
  line-height:1.2;margin-bottom:1.25rem;
}
.info-description{
  font-size:.95rem;line-height:1.7;color:var(--text-body);
  margin-bottom:2rem;
}
.info-tags{
  display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:2rem;
}
.info-tag{
  display:inline-block;padding:.3rem .85rem;
  background:rgba(255,255,255,.06);color:var(--text-body);
  font-size:.7rem;font-weight:500;letter-spacing:.04em;
  border-radius:50px;border:1px solid rgba(255,255,255,.08);
  transition:all .3s;
}
.info-tag:hover{background:rgba(151,234,63,.1);border-color:rgba(151,234,63,.25);color:var(--accent)}
.info-type{
  display:flex;align-items:center;gap:.5rem;
  font-size:.75rem;color:var(--text-muted);margin-bottom:2.5rem;
}
.info-type .type-dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.info-open-link{
  display:inline-flex;align-items:center;gap:.5rem;
  color:var(--accent);font-size:.85rem;font-weight:500;text-decoration:none;
  letter-spacing:.02em;
  transition:all .3s;
}
.info-open-link:hover{gap:.75rem;opacity:.8}
.info-open-link svg{width:16px;height:16px}

/* ===================== CATALOG HEADER (LOGO) ===================== */
#catalog-header{
  position:fixed;top:0;left:0;right:0;z-index:90;
  display:flex;align-items:center;
  padding:1rem 2rem;
  background:linear-gradient(180deg,rgba(0,0,0,.85) 0%,rgba(0,0,0,.4) 60%,transparent 100%);
  pointer-events:none;
  transition:opacity .5s var(--transition-smooth),transform .5s var(--transition-smooth);
}
#catalog-header.hidden{opacity:0;transform:translateY(-100%)}
#catalog-header img{
  height:32px;width:auto;
  pointer-events:auto;
  filter:brightness(1);
  transition:filter .3s;
}
#catalog-header img:hover{filter:brightness(1.2)}
#catalog-header a{pointer-events:auto}

/* ===================== NAVIGATION BAR ===================== */
#nav-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:center;gap:1.5rem;
  padding:1rem 2rem;
  background:rgba(0,0,0,.75);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid rgba(255,255,255,.06);
  transition:transform .5s var(--transition-smooth);
}
#nav-bar.hidden{transform:translateY(100%)}
.nav-btn{
  width:44px;height:44px;border-radius:50%;border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.04);color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .3s var(--transition-smooth);
}
.nav-btn:hover{background:var(--accent);color:#000;border-color:var(--accent)}
.nav-btn:disabled{opacity:.25;pointer-events:none}
.nav-btn svg{width:18px;height:18px}
.nav-indicator{
  display:flex;align-items:center;gap:.6rem;
  font-size:.75rem;font-weight:500;letter-spacing:.1em;color:var(--text-muted);
  cursor:pointer;padding:.5rem .75rem;border-radius:8px;
  transition:background .3s;
}
.nav-indicator:hover{background:rgba(255,255,255,.05)}
.nav-indicator .current{color:var(--accent);font-weight:700}
.nav-dots{display:flex;gap:6px;align-items:center}
.nav-dot{
  width:6px;height:6px;border-radius:50%;
  background:rgba(255,255,255,.15);
  transition:all .4s var(--transition-smooth);
  cursor:pointer;
}
.nav-dot.active{background:var(--accent);width:20px;border-radius:3px}

/* ===================== TOC OVERLAY ===================== */
#toc-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.92);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  display:flex;flex-direction:column;align-items:center;
  padding:3rem 2rem;overflow-y:auto;
  opacity:0;pointer-events:none;
  transition:opacity .4s var(--transition-smooth);
}
#toc-overlay.open{opacity:1;pointer-events:auto}
#toc-overlay .toc-close{
  position:absolute;top:1.5rem;right:1.5rem;
  width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,.15);
  background:transparent;color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:1.2rem;
  transition:all .3s;
}
#toc-overlay .toc-close:hover{background:var(--accent);color:#000;border-color:var(--accent)}
#toc-overlay .toc-overlay-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:1rem;width:100%;max-width:1000px;margin-top:1rem;
}

/* ===================== RESPONSIVE ===================== */
@media(max-width:900px){
  #catalog-track{flex-direction:column}
  .catalog-page{min-width:100vw;min-height:100vh;height:100vh}
  .content-page{flex-direction:column}
  .content-embed-area{flex:0 0 55vh;height:55vh;padding:1.5rem;padding-bottom:.5rem}
  .embed-frame{height:100%}
  .content-info{flex:1;height:auto;padding:1.5rem 1.5rem 6rem;justify-content:flex-start;border-left:none;border-top:1px solid rgba(255,255,255,.04)}
  .info-title{font-size:1.3rem}
  .info-description{font-size:.85rem;margin-bottom:1rem}
  .cover-meta{padding:0 1.5rem;bottom:5rem;flex-direction:column;align-items:center;gap:.5rem}
  .cover-logo{width:160px}
  .toc-grid,.toc-overlay .toc-overlay-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
}
@media(max-width:480px){
  .content-embed-area{padding:1rem;flex:0 0 50vh;height:50vh}
  .content-info{padding:1.25rem 1.25rem 6rem}
}

/* ===================== PAGE TRANSITION ===================== */
.catalog-page .content-embed-area,
.catalog-page .content-info{
  opacity:0;transform:translateY(20px);
  transition:opacity .6s .15s var(--transition-smooth),transform .6s .15s var(--transition-smooth);
}
.catalog-page.active .content-embed-area,
.catalog-page.active .content-info{opacity:1;transform:translateY(0)}
.catalog-page .content-info{transition-delay:.25s}
.catalog-page.active .content-info{transition-delay:.3s}
</style>
</head>
<body>

<div id="catalog-wrapper">
  <div id="catalog-track"></div>
</div>

<header id="catalog-header" class="hidden">
  <a href="#" id="logo-home-link" style="cursor:pointer">
    <img src="https://wearedatalab.com/wp-content/uploads/2024/08/logo-data.png" alt="DataLab">
  </a>
</header>

<nav id="nav-bar" class="hidden">
  <button class="nav-btn" id="btn-prev" aria-label="Anterior">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
  </button>
  <div class="nav-dots" id="nav-dots"></div>
  <div class="nav-indicator" id="nav-indicator" title="Abrir indice">
    <span class="current" id="nav-current">1</span>
    <span>/</span>
    <span id="nav-total">1</span>
  </div>
  <button class="nav-btn" id="btn-next" aria-label="Siguiente">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
  </button>
</nav>

<div id="toc-overlay">
  <button class="toc-close" id="toc-close" aria-label="Cerrar">&times;</button>
  <div class="toc-header">
    <h2>Indice</h2>
    <p>Selecciona una pieza para ver</p>
  </div>
  <div class="toc-overlay-grid" id="toc-overlay-grid"></div>
</div>

<script>
/* ================================================================
   CONFIGURATION - Edit these to customize the catalog
   ================================================================ */
const CATALOG_CONFIG = {
  title: "Catalogo de Piezas",
  subtitle: "Conoce nuestro trabajo",
  clientName: "Cliente Demo",
  year: "2026",
  logoUrl: "https://wearedatalab.com/wp-content/uploads/2024/08/logo-data.png",
  coverBg: "#000",
};

const CATALOG_PAGES = [
  {
    title: "Post Educativo Facebook",
    category: "Redes Sociales",
    description: "Publicacion de Facebook con contenido educativo sobre finanzas personales, disenada para generar engagement y compartidos.",
    tags: ["Mis Finanzas en Casa", "Facebook", "Contenido Educativo", "Finanzas"],
    embedUrl: "https://www.facebook.com/plugins/post.php?href=https%3A%2F%2Fwww.facebook.com%2FMisFinanzasEnCasa%2Fposts%2Fpfbid0kCNDacMVmsoYiERZpkqi4nzk7Af5Qu8sPqX3MfXtzn8kkw8tJY8VW7woUmTzpt61l&show_text=true&width=500",
    type: "facebook",
    thumbnail: "",
  },
  {
    title: "Post Instagram",
    category: "Redes Sociales",
    description: "Publicacion de Instagram de DataLab con contenido de marca, optimizada para alcance organico y conexion con la audiencia.",
    tags: ["DataLab", "Instagram", "Branding", "Marketing Digital"],
    embedUrl: "https://www.instagram.com/p/B6F-6_npBkE/embed/",
    type: "instagram",
    thumbnail: "",
  },
  {

(function() {
  const track = document.getElementById('catalog-track');
  const navBar = document.getElementById('nav-bar');
  const btnPrev = document.getElementById('btn-prev');
  const btnNext = document.getElementById('btn-next');
  const navDots = document.getElementById('nav-dots');
  const navCurrent = document.getElementById('nav-current');
  const navTotal = document.getElementById('nav-total');
  const navIndicator = document.getElementById('nav-indicator');
  const tocOverlay = document.getElementById('toc-overlay');
  const tocClose = document.getElementById('toc-close');
  const tocGrid = document.getElementById('toc-overlay-grid');

  const totalPages = CATALOG_PAGES.length + 2; // cover + toc + content pages
  let currentPage = 0;
  let isAnimating = false;
  let isMobile = window.innerWidth <= 900;
  let touchStartX = 0, touchStartY = 0, touchDelta = 0;

  // ---- Build Cover Page ----
  function buildCover() {
    const div = document.createElement('div');
    div.className = 'catalog-page cover-page active';
    div.innerHTML = `
      <div class="cover-bg"></div>
      <div class="cover-grid"></div>
      <div class="cover-vignette"></div>

        <button class="cover-btn" id="cover-explore-btn">
          Explorar Catalogo
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>

      <div class="cover-meta">
        <span>${CATALOG_CONFIG.year}</span>
        <span>${CATALOG_CONFIG.clientName}</span>

    `;
    track.appendChild(div);
  }

  // ---- Thumbnail helper ----
  const platformIcons = {
    facebook: '<circle cx="300" cy="165" r="35" fill="#1877F2"/><path d="M312 155h-6c-1.7 0-3 1.3-3 3v5h-6v7h6v18h7v-18h6l1-7h-7v-4c0-1 .4-2 2-2h5v-7" fill="#fff" transform="translate(0,0)"/>',
    instagram: '<defs><linearGradient id="ig" x1="0" y1="1" x2="1" y2="0"><stop offset="0%" stop-color="#FD5"/><stop offset="50%" stop-color="#FF543E"/><stop offset="100%" stop-color="#C837AB"/></linearGradient></defs><rect x="265" y="130" width="70" height="70" rx="18" fill="url(#ig)"/><circle cx="300" cy="165" r="17" fill="none" stroke="#fff" stroke-width="3.5"/><circle cx="318" cy="147" r="4" fill="#fff"/>',
    tiktok: '<rect x="272" y="132" width="56" height="66" rx="8" fill="#000" stroke="#333" stroke-width="1"/><path d="M308 150c3 2 6 3 10 3v8c-4 0-7-1-10-3v15c0 8-7 15-15 15s-15-7-15-15 7-15 15-15v8c-4 0-7 3-7 7s3 7 7 7 7-3 7-7v-30h8" fill="#fff"/><path d="M308 150c3 2 6 3 10 3v3c-4-1-7-2-10-4" fill="#25F4EE"/><path d="M293 188c-4 0-7-3-7-7 0-3 2-6 5-7v8c0 1 0 3 1 4l1 2" fill="#FE2C55"/>',
    youtube: '<rect x="262" y="140" width="76" height="50" rx="12" fill="#FF0000"/><polygon points="293,155 313,165 293,175" fill="#fff"/>',
  };
  const defaultIcon = '<circle cx="300" cy="165" r="30" fill="none" stroke="#333" stroke-width="2"/><polygon points="293,152 293,178 313,165" fill="#555"/>';

  const placeholderSvg = (title, cat, type) => {
    const icon = platformIcons[type] || defaultIcon;
    return `data:image/svg+xml,${encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400"><rect fill="#0a0a0a" width="600" height="400"/><rect x="0" y="0" width="600" height="400" fill="none" stroke="#1a1a1a" stroke-width="1"/>${icon}<text x="300" y="225" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="600" fill="#97ea3f" letter-spacing="2" text-transform="uppercase">${(cat || '').toUpperCase()}</text><text x="300" y="248" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#555">${title || ''}</text></svg>`)}`;
  };
  const _cacheBust = Date.now();
  const thumb = (p) => {
    if (p.thumbnail) {
      // Add cache-buster to local images
      if (p.thumbnail.startsWith('/')) return p.thumbnail + '?v=' + _cacheBust;
      return p.thumbnail;
    }
    // Auto-generate YouTube thumbnails from embed URL
    if (p.type === 'youtube' && p.embedUrl) {
      const m = p.embedUrl.match(/embed\/([a-zA-Z0-9_-]+)/);
      if (m) return 'https://img.youtube.com/vi/' + m[1] + '/hqdefault.jpg';
    }
    return placeholderSvg(p.title, p.category, p.type);
  };

  // ---- Build TOC Page ----
  function buildTOC() {
    const div = document.createElement('div');
    div.className = 'catalog-page toc-page';
    let cards = '';
    CATALOG_PAGES.forEach((p, i) => {
      cards += `
        <div class="toc-card" data-goto="${i + 2}">
          <img src="${thumb(p)}" alt="${p.title}" loading="lazy">
          <div class="toc-card-overlay">
            <span class="toc-card-cat">${p.category}</span>
            <span class="toc-card-title">${p.title}</span>
          </div>
          <div class="toc-card-num">${i + 1}</div>
        </div>
      `;
    });
    div.innerHTML = `
      <div class="toc-header">
        <h2>Indice de Piezas</h2>
        <p>${CATALOG_PAGES.length} piezas en este catalogo</p>
      </div>
      <div class="toc-grid">${cards}</div>
    `;
    track.appendChild(div);
  }

  // ---- Build Content Page ----
  function buildContentPage(page, index) {
    const div = document.createElement('div');
    div.className = 'catalog-page content-page';
    div.dataset.pageIndex = index + 2;

    const typeLabels = {
      youtube: 'Video de YouTube',
      vimeo: 'Video de Vimeo',
      image: 'Imagen',
      pdf: 'Documento PDF',
      iframe: 'Sitio Web',
      external: 'Enlace Externo',
      facebook: 'Post de Facebook',
      instagram: 'Post de Instagram',
      tiktok: 'Video de TikTok',
      webpreview: 'Sitio Web',
    };

    const tagsHtml = (page.tags && page.tags.length)
      ? `<div class="info-tags">${page.tags.map(t => `<span class="info-tag">${t}</span>`).join('')}</div>`
      : '';

    div.innerHTML = `
      <div class="content-embed-area">
        <div class="embed-frame" data-type="${page.type}" data-url="${page.embedUrl}" data-loaded="false">
          <div class="embed-placeholder">
            <div class="spinner"></div>
            <span>Cargando contenido...</span>
          </div>
        </div>
      </div>
      <div class="content-info">
        <div class="info-page-num">Pieza <span>${index + 1}</span> / ${CATALOG_PAGES.length}</div>
        <span class="info-category">${page.category}</span>
        <h2 class="info-title">${page.title}</h2>
        <p class="info-description">${page.description}</p>
        ${tagsHtml}
        <div class="info-type">
          <span class="type-dot"></span>
          ${typeLabels[page.type] || 'Contenido'}
        </div>
        <a href="${page.embedUrl}" target="_blank" rel="noopener" class="info-open-link">
          Abrir en nueva pestana
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
      </div>
    `;
    track.appendChild(div);
  }

  // ---- Build Nav Dots ----
  function buildDots() {
    navDots.innerHTML = '';
    for (let i = 0; i < totalPages; i++) {
      const dot = document.createElement('div');
      dot.className = 'nav-dot' + (i === currentPage ? ' active' : '');
      dot.addEventListener('click', () => goToPage(i));
      navDots.appendChild(dot);
    }
    // Only show dots if reasonable count
    if (totalPages > 16) navDots.style.display = 'none';
  }

  // ---- Build TOC Overlay ----
  function buildTOCOverlay() {
    let cards = '';
    CATALOG_PAGES.forEach((p, i) => {
      cards += `
        <div class="toc-card" data-goto="${i + 2}">
          <img src="${thumb(p)}" alt="${p.title}" loading="lazy">
          <div class="toc-card-overlay">
            <span class="toc-card-cat">${p.category}</span>
            <span class="toc-card-title">${p.title}</span>
          </div>
          <div class="toc-card-num">${i + 1}</div>
        </div>
      `;
    });
    tocGrid.innerHTML = cards;
  }

  // ---- Lazy Load Embeds ----
  function loadEmbed(pageIndex) {
    const page = track.children[pageIndex];
    if (!page) return;
    const frame = page.querySelector('.embed-frame');
    if (!frame || frame.dataset.loaded === 'true') return;

    const type = frame.dataset.type;
    const url = frame.dataset.url;
    frame.dataset.loaded = 'true';

    const placeholder = frame.querySelector('.embed-placeholder');

    switch (type) {
      case 'youtube':
      case 'vimeo': {
        const iframe = document.createElement('iframe');
        iframe.src = url;
        iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
        iframe.allowFullscreen = true;
        iframe.loading = 'lazy';
        iframe.onload = () => { if (placeholder) placeholder.remove(); };
        frame.appendChild(iframe);
        break;
      }
      case 'image': {
        const img = document.createElement('img');
        img.src = url;
        img.alt = '';
        img.loading = 'lazy';
        img.onload = () => { if (placeholder) placeholder.remove(); };
        img.onerror = () => {
          if (placeholder) placeholder.innerHTML = '<span>No se pudo cargar la imagen</span>';
        };
        frame.appendChild(img);
        break;
      }
      case 'pdf': {
        const obj = document.createElement('object');
        obj.data = url;
        obj.type = 'application/pdf';
        obj.style.cssText = 'width:100%;height:100%';
        obj.innerHTML = `<div class="embed-fallback"><p>No se puede mostrar el PDF directamente.</p><a href="${url}" target="_blank">Abrir PDF</a></div>`;
        if (placeholder) placeholder.remove();
        frame.appendChild(obj);
        break;
      }
      case 'facebook': {
        const fbIframe = document.createElement('iframe');
        const isReel = url.includes('video.php') || url.includes('reel');
        // Facebook max embed width is 750px
        const fbMaxW = isReel ? 350 : Math.min(frame.offsetWidth - 48, 680);
        let fbUrl = url;
        if (fbUrl.includes('width=')) {
          fbUrl = fbUrl.replace(/width=\d+/, 'width=' + Math.round(fbMaxW));
        }
        // Set proper height for reels vs posts (extra space for likes/shares bar)
        if (isReel) {
          fbIframe.style.cssText = 'max-width:350px;min-height:850px;height:850px';
        } else {
          // Use the original height from the URL if available, otherwise generous default
          const hMatch = url.match(/height=(\d+)/);
          const baseH = hMatch ? parseInt(hMatch[1]) : 800;
          const finalH = Math.max(baseH + 200, 950);
          fbIframe.style.cssText = 'max-width:680px;min-height:' + finalH + 'px';
        }
        fbIframe.src = fbUrl;
        fbIframe.allow = 'autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share';
        fbIframe.allowFullscreen = true;
        fbIframe.scrolling = 'no';
        fbIframe.onload = () => { if (placeholder) placeholder.remove(); };
        frame.appendChild(fbIframe);
        break;
      }
      case 'instagram':
      case 'tiktok': {
        const socialIframe = document.createElement('iframe');
        socialIframe.src = url;
        socialIframe.allow = 'autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share';
        socialIframe.allowFullscreen = true;
        socialIframe.scrolling = 'no';
        socialIframe.onload = () => { if (placeholder) placeholder.remove(); };
        frame.appendChild(socialIframe);
        break;
      }
      case 'webpreview': {
        const wpWrap = document.createElement('div');
        wpWrap.className = 'webpreview-wrap';
        const wpImg = document.createElement('img');
        // Use thumbnail as the preview screenshot
        const pageData = CATALOG_PAGES[pageIndex - 2];
        const wpSrc = pageData ? pageData.thumbnail : '';
        wpImg.src = wpSrc && wpSrc.startsWith('/') ? wpSrc + '?v=' + Date.now() : wpSrc;
        wpImg.alt = pageData ? pageData.title : '';
        wpImg.loading = 'lazy';
        wpImg.onload = () => { if (placeholder) placeholder.remove(); };
        const wpOverlay = document.createElement('div');
        wpOverlay.className = 'webpreview-overlay';
        wpOverlay.innerHTML = `<a class="webpreview-btn" href="${url}" target="_blank" rel="noopener">Visitar Sitio <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></a>`;
        wpWrap.appendChild(wpImg);
        wpWrap.appendChild(wpOverlay);
        frame.appendChild(wpWrap);
        break;
      }
      case 'iframe':
      case 'external': {
        const iframe = document.createElement('iframe');
        iframe.src = url;
        iframe.loading = 'lazy';
        iframe.sandbox = 'allow-scripts allow-same-origin allow-popups';
        iframe.onload = () => { if (placeholder) placeholder.remove(); };
        iframe.onerror = () => {
          frame.innerHTML = `<div class="embed-fallback"><p>Este contenido no se puede mostrar en un marco.</p><a href="${url}" target="_blank" rel="noopener">Abrir en nueva pestana</a></div>`;
        };
        frame.appendChild(iframe);
        // Fallback timeout
        setTimeout(() => {
          if (placeholder && placeholder.parentNode) {
            placeholder.remove();
          }
        }, 5000);
        break;
      }
      default:
        if (placeholder) placeholder.innerHTML = '<span>Tipo de contenido no soportado</span>';
    }
  }

  // ---- Navigation ----
  function goToPage(index) {
    if (isAnimating || index < 0 || index >= totalPages || index === currentPage) return;
    isAnimating = true;

    // Pause/stop all media on the page we're leaving
    const oldPage = track.children[currentPage];
    if (oldPage) {
      oldPage.classList.remove('active');
      // Stop YouTube/Vimeo iframes by resetting src
      oldPage.querySelectorAll('iframe').forEach(iframe => {
        const src = iframe.src;
        if (src && (src.includes('youtube') || src.includes('vimeo'))) {
          iframe.src = '';
          iframe.src = src;
        }
      });
      // Pause HTML5 video/audio elements
      oldPage.querySelectorAll('video, audio').forEach(m => { try { m.pause(); } catch(e){} });
    }

    currentPage = index;
    sessionStorage.setItem('catalog-current-page', currentPage);

    // Move track
    if (isMobile) {
      track.style.transform = `translateY(-${currentPage * 100}vh)`;
    } else {
      track.style.transform = `translateX(-${currentPage * 100}vw)`;
    }

    // Lazy load nearby
    loadEmbed(currentPage);
    loadEmbed(currentPage + 1);
    if (currentPage > 0) loadEmbed(currentPage - 1);

    // Update nav
    updateNav();

    // Show/hide navbar + header logo
    const catalogHeader = document.getElementById('catalog-header');
    if (currentPage === 0) {
      navBar.classList.add('hidden');
      catalogHeader.classList.add('hidden');
    } else {
      navBar.classList.remove('hidden');
      catalogHeader.classList.remove('hidden');
    }

    // Set active after transition
    setTimeout(() => {
      const newPage = track.children[currentPage];
      if (newPage) newPage.classList.add('active');
      isAnimating = false;
    }, 100);

    // Close overlay if open
    tocOverlay.classList.remove('open');
  }

  function updateNav() {
    navCurrent.textContent = currentPage + 1;
    navTotal.textContent = totalPages;

    btnPrev.disabled = currentPage === 0;
    btnNext.disabled = currentPage === totalPages - 1;

    // Update dots
    document.querySelectorAll('.nav-dot').forEach((d, i) => {
      d.classList.toggle('active', i === currentPage);
    });
  }

  // ---- Events ----
  btnPrev.addEventListener('click', () => goToPage(currentPage - 1));
  btnNext.addEventListener('click', () => goToPage(currentPage + 1));

  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (tocOverlay.classList.contains('open')) {
      if (e.key === 'Escape') tocOverlay.classList.remove('open');
      return;
    }
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); goToPage(currentPage + 1); }
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); goToPage(currentPage - 1); }
    if (e.key === 'Home') { e.preventDefault(); goToPage(0); }
    if (e.key === 'End') { e.preventDefault(); goToPage(totalPages - 1); }
    if (e.key === 'Escape') goToPage(0);
  });

  // Mouse wheel
  let wheelTimeout;
  document.addEventListener('wheel', (e) => {
    e.preventDefault();
    if (wheelTimeout) return;
    wheelTimeout = setTimeout(() => { wheelTimeout = null; }, 800);
    if (e.deltaY > 30 || e.deltaX > 30) goToPage(currentPage + 1);
    else if (e.deltaY < -30 || e.deltaX < -30) goToPage(currentPage - 1);
  }, { passive: false });

  // Touch swipe
  document.addEventListener('touchstart', (e) => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    touchDelta = 0;
  }, { passive: true });

  document.addEventListener('touchmove', (e) => {
    const dx = e.touches[0].clientX - touchStartX;
    const dy = e.touches[0].clientY - touchStartY;
    touchDelta = isMobile ? dy : dx;
  }, { passive: true });

  document.addEventListener('touchend', () => {
    if (Math.abs(touchDelta) > 50) {
      if (touchDelta < 0) goToPage(currentPage + 1);
      else goToPage(currentPage - 1);
    }
  });

  // TOC overlay
  navIndicator.addEventListener('click', () => {
    tocOverlay.classList.toggle('open');
  });
  tocClose.addEventListener('click', () => {
    tocOverlay.classList.remove('open');
  });

  // Click handlers on TOC cards (both in-page and overlay)
  document.addEventListener('click', (e) => {
    const card = e.target.closest('.toc-card[data-goto]');
    if (card) {
      goToPage(parseInt(card.dataset.goto));
    }
  });

  // Cover explore button
  document.addEventListener('click', (e) => {
    if (e.target.closest('#cover-explore-btn')) {
      goToPage(1);
    }
  });

  // Resize handler
  window.addEventListener('resize', () => {
    const wasMobile = isMobile;
    isMobile = window.innerWidth <= 900;
    if (wasMobile !== isMobile) {
      // Reposition without animation
      track.style.transition = 'none';
      if (isMobile) {
        track.style.flexDirection = 'column';
        track.style.transform = `translateY(-${currentPage * 100}vh)`;
      } else {
        track.style.flexDirection = 'row';
        track.style.transform = `translateX(-${currentPage * 100}vw)`;
      }
      requestAnimationFrame(() => {
        track.style.transition = '';
      });
    }
  });

  // ---- Logo → Home ----
  document.getElementById('logo-home-link').addEventListener('click', (e) => {
    e.preventDefault();
    goToPage(0);
  });

  // ---- Initialize ----
  function init() {
    buildCover();
    buildTOC();
    CATALOG_PAGES.forEach((p, i) => buildContentPage(p, i));
    buildDots();
    buildTOCOverlay();
    navTotal.textContent = totalPages;
    navCurrent.textContent = '1';

    // Set initial layout direction
    if (isMobile) {
      track.style.flexDirection = 'column';
    }

    // Restore page from session (persist on F5)
    const savedPage = sessionStorage.getItem('catalog-current-page');
    if (savedPage !== null) {
      const pg = parseInt(savedPage, 10);
      if (pg > 0 && pg < totalPages) {
        // Jump without animation
        currentPage = pg;
        track.style.transition = 'none';
        if (isMobile) {
          track.style.transform = `translateY(-${pg * 100}vh)`;
        } else {
          track.style.transform = `translateX(-${pg * 100}vw)`;
        }
        navBar.classList.remove('hidden');
        document.getElementById('catalog-header').classList.remove('hidden');
        loadEmbed(pg);
        loadEmbed(pg + 1);
        if (pg > 0) loadEmbed(pg - 1);
        updateNav();
        requestAnimationFrame(() => {
          track.style.transition = '';
          track.children[pg].classList.add('active');
        });
        return;
      }
    }

    // Default: mark cover as active
    track.children[0].classList.add('active');
  }

  init();
})();
</script>
</body>
</html>
